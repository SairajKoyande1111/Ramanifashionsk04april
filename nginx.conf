server {
    listen 80;
    server_name ramanifashion.in www.ramanifashion.in;

    # Allow large file uploads (product images, banners, videos)
    client_max_body_size 150M;

    # Increase timeouts for large uploads
    proxy_connect_timeout       300s;
    proxy_send_timeout          300s;
    proxy_read_timeout          300s;
    send_timeout                300s;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Buffer settings for large uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Serve static media files directly through Nginx (faster)
    location /media/ {
        alias /root/your-project-folder/public/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /images/ {
        alias /root/your-project-folder/public/images/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
